<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState: uS_AP, useEffect: uE_AP } = React;

// Wrap any add-item screen in the iOS device frame for presentation
function InDevice({ children }) {
  return (
    <IOSDevice dark={true} width={360} height={760}>
      <div style={{minHeight:'100%', paddingTop: 54, background: TOKENS.bg}}>
        {children}
      </div>
    </IOSDevice>
  );
}

const noop = () => {};
const accentGold = ACCENTS.gold;
const accentCopper = ACCENTS.copper;
const accentBone = ACCENTS.bone;

// ─────────────────────────────────────────────────────────────
// Variant A — Classic 3-step (Capture)
// ─────────────────────────────────────────────────────────────
function ClassicCapture({ accent }) {
  return <AddItemFlow accent={accent} tweaks={{analyzing:'scan'}} onDone={noop} onCancel={noop}/>;
}

// Force the 3-step flow to specific internal steps by re-mounting with overrides
function ForceStep({ step, accent, animStyle='scan' }) {
  // AddItemFlow internally controls step — build the underlying steps directly
  return (
    <>
      {step === 1 && <StepCapture accent={accent} onNext={noop}/>}
      {step === 2 && <StepAnalyzing accent={accent} animStyle={animStyle} onComplete={noop}/>}
      {step === 3 && <StepReview accent={accent} onCancel={noop} onSave={noop}/>}
    </>
  );
}

// Simple flow pinned to a phase
function SimplePinned({ phase, accent }) {
  // AddItemSimple's internal phase isn't externally controllable — render the
  // relevant chunk by cloning the component and forcing initial state.
  return <AddItemSimplePinned phase={phase} accent={accent}/>;
}

// Local pinned version that mirrors AddItemSimple's three phases cleanly.
function AddItemSimplePinned({ phase, accent }) {
  const [p, setP] = uS_AP(phase);
  // Re-set if the prop changes (canvas rerender)
  uE_AP(()=> setP(phase), [phase]);
  // We shadow AddItemSimple by reusing it but jumping state is tricky since
  // its state is internal. So we just render AddItemSimple and then for
  // 'analyzing' / 'form' variants, rely on a timeout that AddItemSimple uses.
  // Instead: render simple subcomponents we already have (capture → analyzing overlay + form inline).
  if (p === 'capture') {
    return <AddItemSimpleCapture accent={accent}/>;
  }
  return <AddItemSimpleRest accent={accent} analyzing={p === 'analyzing'}/>;
}

// Inline extracted capture (simpler than introspecting AddItemSimple)
function AddItemSimpleCapture({ accent }) {
  return (
    <div style={{minHeight:'100%', background: TOKENS.bg, display:'flex', flexDirection:'column'}}>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 16px 8px'}}>
        <button style={{width:36,height:36,borderRadius:12,background:TOKENS.surface,border:`1px solid ${TOKENS.border}`,color:TOKENS.textMuted,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon.close style={{width:16,height:16}}/></button>
        <div style={{fontFamily:TOKENS.mono,fontSize:10,letterSpacing:1.5,color:TOKENS.textDim,textTransform:'uppercase'}}>New Item</div>
        <div style={{width:36}}/>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:'20px 24px'}}>
        <div style={{width:96,height:96,borderRadius:28,background:accent.soft,border:`1px solid ${accent.solid}40`,display:'flex',alignItems:'center',justifyContent:'center',color:accent.solid,marginBottom:28}}>
          <Icon.camera style={{width:44,height:44}}/>
        </div>
        <div style={{fontFamily:TOKENS.serif,fontSize:28,fontWeight:400,color:TOKENS.text,letterSpacing:-0.7,lineHeight:1.1,marginBottom:10,maxWidth:280}}>Show Claude the garment.</div>
        <div style={{fontFamily:TOKENS.sans,fontSize:13,color:TOKENS.textMuted,maxWidth:260,lineHeight:1.5}}>Plain background, good light. One piece at a time.</div>
      </div>
      <div style={{padding:'0 20px 28px',display:'flex',flexDirection:'column',gap:10}}>
        <PrimaryButton accent={accent} icon={<Icon.camera/>}>Take Photo</PrimaryButton>
        <PrimaryButton accent={accent} variant="ghost" icon={<Icon.library/>}>Choose from Library</PrimaryButton>
      </div>
    </div>
  );
}

// Show the post-capture view, with or without the scan overlay
function AddItemSimpleRest({ accent, analyzing }) {
  const [seasons] = uS_AP(new Set(DETECTED_ITEM.seasons));
  return (
    <div style={{minHeight:'100%',background:TOKENS.bg,paddingBottom:80}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px 8px'}}>
        <button style={{width:36,height:36,borderRadius:12,background:TOKENS.surface,border:`1px solid ${TOKENS.border}`,color:TOKENS.textMuted,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon.close style={{width:16,height:16}}/></button>
        <div style={{fontFamily:TOKENS.mono,fontSize:10,letterSpacing:1.5,color:TOKENS.textDim,textTransform:'uppercase'}}>New Item</div>
        <div style={{width:36}}/>
      </div>
      <div style={{padding:'12px 16px 0'}}>
        <div style={{position:'relative',borderRadius:24,overflow:'hidden',border:`1px solid ${TOKENS.border}`,aspectRatio:'4/3'}}>
          <div style={{filter: analyzing ? 'blur(2px) saturate(0.85)':'none',transition:'filter 400ms ease',height:'100%'}}>
            <GarmentTile tone={DETECTED_ITEM.tone} label={DETECTED_ITEM.label} corner={0} showLabel={false}/>
          </div>
          {analyzing && (
            <>
              <style>{`@keyframes ap-scan{0%{top:0}100%{top:100%}}@keyframes ap-pulse{0%,100%{opacity:.6}50%{opacity:1}}`}</style>
              <div style={{position:'absolute',left:0,right:0,height:2,background:`linear-gradient(to bottom, transparent, ${accent.solid}, transparent)`,boxShadow:`0 0 24px ${accent.solid}`,animation:'ap-scan 1.6s ease-in-out infinite alternate'}}/>
              <div style={{position:'absolute',left:'50%',bottom:14,transform:'translateX(-50%)',display:'inline-flex',alignItems:'center',gap:8,height:28,padding:'0 14px',borderRadius:TOKENS.rPill,background:'rgba(10,10,10,0.75)',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',border:`1px solid ${TOKENS.border}`,color:TOKENS.text,fontFamily:TOKENS.sans,fontSize:12,letterSpacing:-0.05,animation:'ap-pulse 1.4s ease-in-out infinite'}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:accent.solid}}/>
                Claude is analyzing…
              </div>
            </>
          )}
          {!analyzing && (
            <div style={{position:'absolute',left:12,top:12,display:'inline-flex',alignItems:'center',gap:6,height:24,padding:'0 10px',borderRadius:TOKENS.rPill,background:'rgba(10,10,10,0.7)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',border:`1px solid ${accent.solid}50`,color:accent.solid,fontFamily:TOKENS.mono,fontSize:9,letterSpacing:1.2,textTransform:'uppercase',fontWeight:600}}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3z" fill="currentColor"/></svg>
              Detected · {Math.round(DETECTED_ITEM.confidence*100)}%
            </div>
          )}
        </div>
      </div>
      <div style={{padding:'22px 20px 8px'}}>
        <div style={{color:TOKENS.text,fontFamily:TOKENS.serif,fontSize:28,fontWeight:400,letterSpacing:-0.7,lineHeight:1.05,marginBottom:8}}>{DETECTED_ITEM.sub}</div>
        <div style={{display:'flex',gap:8,overflowX:'auto',scrollbarWidth:'none'}} className="hide-scrollbar">
          {CATEGORIES.filter(c=>c!=='All').slice(0,5).map(c=>(
            <FilterPill key={c} active={c===DETECTED_ITEM.category} accent={accent}>{c}</FilterPill>
          ))}
        </div>
      </div>
      <div style={{padding:'20px 16px 0'}}>
        <div style={{background:TOKENS.surface,border:`1px solid ${TOKENS.border}`,borderRadius:TOKENS.rCard,overflow:'hidden'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,padding:'14px 16px',borderBottom:`1px solid ${TOKENS.borderSoft}`}}>
            <div style={{fontFamily:TOKENS.sans,fontSize:13,color:TOKENS.text,fontWeight:500}}>Color</div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:22,height:22,borderRadius:7,background:DETECTED_ITEM.primary.hex,border:'1px solid rgba(255,255,255,0.1)'}}/>
              <div style={{fontFamily:TOKENS.sans,fontSize:13,color:TOKENS.text}}>{DETECTED_ITEM.primary.name}</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,padding:'14px 16px',borderBottom:`1px solid ${TOKENS.borderSoft}`}}>
            <div>
              <div style={{fontFamily:TOKENS.sans,fontSize:13,color:TOKENS.text,fontWeight:500}}>Formality</div>
              <div style={{fontFamily:TOKENS.mono,fontSize:9,letterSpacing:1.2,color:TOKENS.textDim,textTransform:'uppercase',marginTop:2}}>sharp</div>
            </div>
            <div style={{display:'flex',gap:4}}>
              {[1,2,3,4,5].map(n=>(
                <div key={n} style={{width:20,height:20,borderRadius:'50%',background: n<=4 ? accent.solid : 'transparent', border: n<=4 ? 'none' : `1px solid ${TOKENS.border}`}}/>
              ))}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,padding:'14px 16px'}}>
            <div style={{fontFamily:TOKENS.sans,fontSize:13,color:TOKENS.text,fontWeight:500}}>Seasons</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
              {['Spring','Summer','Fall','Winter'].map(s=>{
                const active = seasons.has(s);
                return <div key={s} style={{height:24,padding:'0 9px',borderRadius:TOKENS.rPill,background:active?accent.soft:'transparent',border:`1px solid ${active?accent.solid:TOKENS.border}`,color:active?accent.solid:TOKENS.textMuted,fontFamily:TOKENS.sans,fontSize:10,fontWeight:active?600:500,display:'flex',alignItems:'center'}}>{s}</div>;
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Variant D — Full-bleed camera with grid overlay + floating ring shutter
// ─────────────────────────────────────────────────────────────
function FullBleedCamera({ accent }) {
  return (
    <div style={{position:'relative',minHeight:'100%',background:'#0a0a0a',overflow:'hidden'}}>
      {/* viewfinder */}
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 40%, #1f1a14 0%, #0a0a0a 70%)'}}/>
      {/* grid */}
      <svg style={{position:'absolute',inset:'10% 6%',opacity:0.25}} width="88%" height="70%" viewBox="0 0 100 100" preserveAspectRatio="none">
        <line x1="33" y1="0" x2="33" y2="100" stroke="#fff" strokeWidth="0.2"/>
        <line x1="66" y1="0" x2="66" y2="100" stroke="#fff" strokeWidth="0.2"/>
        <line x1="0" y1="33" x2="100" y2="33" stroke="#fff" strokeWidth="0.2"/>
        <line x1="0" y1="66" x2="100" y2="66" stroke="#fff" strokeWidth="0.2"/>
      </svg>
      {/* corner reticles */}
      {['tl','tr','bl','br'].map(k=>{
        const s = {tl:{top:60,left:30,borderTop:`2px solid ${accent.solid}`,borderLeft:`2px solid ${accent.solid}`},
                   tr:{top:60,right:30,borderTop:`2px solid ${accent.solid}`,borderRight:`2px solid ${accent.solid}`},
                   bl:{bottom:140,left:30,borderBottom:`2px solid ${accent.solid}`,borderLeft:`2px solid ${accent.solid}`},
                   br:{bottom:140,right:30,borderBottom:`2px solid ${accent.solid}`,borderRight:`2px solid ${accent.solid}`}}[k];
        return <div key={k} style={{position:'absolute',width:26,height:26,...s}}/>;
      })}
      {/* top bar */}
      <div style={{position:'absolute',top:14,left:16,right:16,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button style={{width:36,height:36,borderRadius:18,background:'rgba(255,255,255,0.08)',border:`1px solid rgba(255,255,255,0.15)`,color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(8px)'}}><Icon.close style={{width:16,height:16}}/></button>
        <div style={{fontFamily:TOKENS.mono,fontSize:9,letterSpacing:1.5,color:'rgba(255,255,255,0.7)',textTransform:'uppercase'}}>One Piece · Plain BG</div>
        <div style={{width:36}}/>
      </div>
      {/* headline */}
      <div style={{position:'absolute',top:'42%',left:0,right:0,textAlign:'center',transform:'translateY(-50%)'}}>
        <div style={{fontFamily:TOKENS.serif,fontSize:26,color:'#fff',letterSpacing:-0.5,lineHeight:1.1,fontWeight:400,maxWidth:240,margin:'0 auto'}}>Center the garment in the frame.</div>
      </div>
      {/* controls: library / shutter / flash */}
      <div style={{position:'absolute',bottom:30,left:0,right:0,display:'flex',alignItems:'center',justifyContent:'space-around',padding:'0 30px'}}>
        <button style={{width:48,height:48,borderRadius:14,background:'rgba(255,255,255,0.1)',border:`1px solid rgba(255,255,255,0.12)`,color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon.library style={{width:20,height:20}}/></button>
        <button style={{width:76,height:76,borderRadius:'50%',background:'transparent',border:`3px solid ${accent.solid}`,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 0 0 6px rgba(10,10,10,0.5), 0 8px 24px ${accent.solid}60`}}>
          <div style={{width:56,height:56,borderRadius:'50%',background:accent.solid}}/>
        </button>
        <button style={{width:48,height:48,borderRadius:14,background:'rgba(255,255,255,0.1)',border:`1px solid rgba(255,255,255,0.12)`,color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:TOKENS.mono,fontSize:10,letterSpacing:0.5}}>A</button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Variant E — Bottom-sheet capture (modal up from closet)
// ─────────────────────────────────────────────────────────────
function BottomSheet({ accent }) {
  return (
    <div style={{position:'relative',minHeight:'100%',background:TOKENS.bg}}>
      {/* dimmed closet behind */}
      <div style={{position:'absolute',inset:0,background:TOKENS.bg,opacity:1}}>
        <div style={{padding:'12px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,opacity:0.25,filter:'blur(1px)'}}>
          {WARDROBE.slice(0,4).map(i=>(
            <div key={i.id} style={{background:TOKENS.surface,borderRadius:TOKENS.rCard,border:`1px solid ${TOKENS.border}`,overflow:'hidden'}}>
              <GarmentTile tone={i.tone} label={i.label} corner={0}/>
              <div style={{padding:'10px 12px'}}>
                <div style={{fontFamily:TOKENS.sans,fontSize:11,color:TOKENS.text}}>{i.sub}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.55)',backdropFilter:'blur(4px)'}}/>
      {/* sheet */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,background:TOKENS.surface,borderTopLeftRadius:28,borderTopRightRadius:28,border:`1px solid ${TOKENS.border}`,borderBottom:'none',padding:'14px 20px 32px',boxShadow:'0 -30px 60px rgba(0,0,0,0.5)'}}>
        <div style={{width:40,height:4,borderRadius:2,background:TOKENS.border,margin:'0 auto 18px'}}/>
        <div style={{fontFamily:TOKENS.mono,fontSize:10,letterSpacing:1.5,color:accent.solid,textTransform:'uppercase',marginBottom:6}}>Add to closet</div>
        <div style={{fontFamily:TOKENS.serif,fontSize:26,color:TOKENS.text,letterSpacing:-0.6,lineHeight:1.1,fontWeight:400,marginBottom:6}}>How would you like to add it?</div>
        <div style={{fontFamily:TOKENS.sans,fontSize:13,color:TOKENS.textMuted,marginBottom:22}}>Claude tags it for you in a few seconds.</div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <ActionTile accent={accent} icon={<Icon.camera style={{width:22,height:22}}/>} title="Camera" sub="Take a photo"/>
          <ActionTile accent={accent} icon={<Icon.library style={{width:22,height:22}}/>} title="Library" sub="Pick an image"/>
        </div>
        <ActionTile accent={accent} icon={<Icon.sparkle style={{width:22,height:22}}/>} title="Import from brand" sub="Paste a product URL" full/>
      </div>
    </div>
  );
}
function ActionTile({ accent, icon, title, sub, full }) {
  return (
    <button style={{background:TOKENS.bg,border:`1px solid ${TOKENS.border}`,borderRadius:18,padding:'16px',textAlign:'left',cursor:'pointer',color:TOKENS.text,gridColumn: full ? 'span 2' : undefined,display:'flex',alignItems:'center',gap:14}}>
      <div style={{width:40,height:40,borderRadius:12,background:accent.soft,color:accent.solid,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{icon}</div>
      <div>
        <div style={{fontFamily:TOKENS.serif,fontSize:16,fontWeight:400,letterSpacing:-0.2,color:TOKENS.text}}>{title}</div>
        <div style={{fontFamily:TOKENS.sans,fontSize:11,color:TOKENS.textMuted,marginTop:2}}>{sub}</div>
      </div>
    </button>
  );
}

// ─────────────────────────────────────────────────────────────
// Variant F — Two big cards (editorial split) — simplest possible
// ─────────────────────────────────────────────────────────────
function SplitCards({ accent }) {
  return (
    <div style={{minHeight:'100%',background:TOKENS.bg,padding:'16px 16px 28px',display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <button style={{width:36,height:36,borderRadius:12,background:TOKENS.surface,border:`1px solid ${TOKENS.border}`,color:TOKENS.textMuted,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon.close style={{width:16,height:16}}/></button>
        <div style={{fontFamily:TOKENS.mono,fontSize:10,letterSpacing:1.5,color:TOKENS.textDim,textTransform:'uppercase'}}>New Item</div>
        <div style={{width:36}}/>
      </div>
      <div>
        <div style={{fontFamily:TOKENS.serif,fontSize:30,color:TOKENS.text,letterSpacing:-0.8,lineHeight:1.05,fontWeight:400,marginBottom:6}}>Add a piece.</div>
        <div style={{fontFamily:TOKENS.sans,fontSize:13,color:TOKENS.textMuted,marginBottom:20}}>Pick one to begin.</div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:12}}>
        <SplitCard accent={accent} icon={<Icon.camera style={{width:32,height:32}}/>} title="Take Photo" sub="Capture a piece from your closet."/>
        <SplitCard accent={accent} icon={<Icon.library style={{width:32,height:32}}/>} title="Choose from Library" sub="Use an existing image."/>
      </div>
      <div style={{marginTop:14,fontFamily:TOKENS.mono,fontSize:9,letterSpacing:1.2,color:TOKENS.textDim,textTransform:'uppercase',textAlign:'center'}}>Claude tags in &lt; 4 seconds</div>
    </div>
  );
}
function SplitCard({ accent, icon, title, sub }) {
  return (
    <button style={{flex:1,background:TOKENS.surface,border:`1px solid ${TOKENS.border}`,borderRadius:24,padding:'22px',cursor:'pointer',color:TOKENS.text,textAlign:'left',display:'flex',flexDirection:'column',justifyContent:'space-between',minHeight:140}}>
      <div style={{color:accent.solid}}>{icon}</div>
      <div>
        <div style={{fontFamily:TOKENS.serif,fontSize:22,fontWeight:400,letterSpacing:-0.3,color:TOKENS.text}}>{title}</div>
        <div style={{fontFamily:TOKENS.sans,fontSize:12,color:TOKENS.textMuted,marginTop:4}}>{sub}</div>
      </div>
    </button>
  );
}

// ─────────────────────────────────────────────────────────────
// Canvas assembly
// ─────────────────────────────────────────────────────────────
function Canvas() {
  return (
    <DesignCanvas>
      <DCSection id="simple" title="Simple flow (current)" subtitle="One screen, three phases. Capture → analyzing → form.">
        <DCArtboard id="s-capture" label="1 · Capture" width={360} height={760}>
          <InDevice><AddItemSimpleCapture accent={accentGold}/></InDevice>
        </DCArtboard>
        <DCArtboard id="s-analyzing" label="2 · Analyzing" width={360} height={760}>
          <InDevice><AddItemSimpleRest accent={accentGold} analyzing={true}/></InDevice>
        </DCArtboard>
        <DCArtboard id="s-form" label="3 · Review" width={360} height={760}>
          <InDevice><AddItemSimpleRest accent={accentGold} analyzing={false}/></InDevice>
        </DCArtboard>
      </DCSection>

      <DCSection id="classic" title="Classic 3-step" subtitle="Full-screen per step, hero framing.">
        <DCArtboard id="c-capture" label="1 · Capture" width={360} height={760}>
          <InDevice><StepCapture accent={accentGold} onNext={noop}/></InDevice>
        </DCArtboard>
        <DCArtboard id="c-analyzing" label="2 · Analyzing" width={360} height={760}>
          <InDevice><StepAnalyzing accent={accentGold} animStyle="scan" onComplete={noop}/></InDevice>
        </DCArtboard>
        <DCArtboard id="c-review" label="3 · Review" width={360} height={760}>
          <div style={{position:'relative',width:360,height:760}}>
            <InDevice><StepReview accent={accentGold} onCancel={noop} onSave={noop}/></InDevice>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="alt" title="Alternative directions" subtitle="Three more ways to frame the capture moment.">
        <DCArtboard id="alt-bleed" label="D · Full-bleed camera" width={360} height={760}>
          <InDevice><FullBleedCamera accent={accentGold}/></InDevice>
        </DCArtboard>
        <DCArtboard id="alt-sheet" label="E · Bottom sheet" width={360} height={760}>
          <InDevice><BottomSheet accent={accentCopper}/></InDevice>
        </DCArtboard>
        <DCArtboard id="alt-split" label="F · Split cards" width={360} height={760}>
          <InDevice><SplitCards accent={accentBone}/></InDevice>
        </DCArtboard>
      </DCSection>

      <DCPostIt top={60} right={80} rotate={-3} width={200}>
        Click any artboard label to open it fullscreen. Arrow keys navigate.
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Canvas/>);
</script>
</body>
</html>
